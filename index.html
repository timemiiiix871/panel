<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обзвон на ТП | Панель</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .lucide { width: 1.2em; height: 1.2em; vertical-align: middle; }
        
        .custom-scrollbar::-webkit-scrollbar {
            height: 8px;
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f8fafc;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .header-gradient {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
        }

        thead th {
            position: sticky;
            top: 0;
            z-index: 30;
            background: #f8fafc;
        }
    </style>
</head>
<body class="bg-[#f3f4f9]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const QUESTIONS_DATA = [
          { q: "Представьтесь пожалуйста, расскажите о себе, как вас зовут и сколько вам лет?", isIntro: true },
          { q: "Разрешено публиковать объявление с покупкой/продажей 'Пустого номера'?", a: "Нет, продажа пустого номера запрещена и наказывается 11 пунктом правил." },
          { q: "В каком канале публикуется объявление об обмене автомобиля на тактический рюкзак?", a: "Допустимого канала для такого рода объявлений нет." },
          { q: "Сколько слов Caps Lock'ом можно написать в одном объявлении?", a: "Максимум 3 слова можно написать Caps'ом." },
          { q: "Допустима ли купля/продажа номеров на транспорт с указанием запретных слов?", a: "Нет, использование запретных слов на номерах недопустимо, поскольку они так же модерируются." },
          { q: "Разрешается ли делать пропуски после каждой написанной строки в объявлении?", a: "Нет, так как пропуски через каждую строку текста искусственно увеличивают текст." },
          { q: "Разрешено ли объявление не на языке сервера?", a: "Язык общения на сервере - русский. Объявления должны быть написаны на языке сервера." },
          { q: "Какое максимальное количество транспортных средств можно упомянуть в одном объявлении при купле/продаже?", a: "Не больше 5 авто. Неопределенная марка авто/выкуп авто, приравнивается к единице транспортного средства." },
          { q: "Разрешено ли продавать ключи от авто?", a: "Нет, такие действия запрещены." },
          { q: "Допускаются ли объявления о покупке/продаже семьи?", a: "Подобные объявления не допускаются, так как нет функционала, способного передать семью." },
          { q: "Пользователь опубликовал объявление о продаже 'АЗС №2' за 3млн. А ниже пользователь пишет, что купит данный бизнес за 2млн. Считается ли это нарушением?", a: "Нет. Если владелец бизнеса опубликовал объявление о продаже, ему необходимо писать в личные сообщения для торгов. Иные объявления о купле с занижением цены считаются неприемлемыми." },
          { q: "На какой максимальный срок можно сдать транспорт в аренду?", a: "Транспорт можно сдавать в аренду не более чем на 7 дней." },
          { q: "Разрешается ли заключать OOC договор на сервере?", a: "Нет, такие действия запрещены." },
          { q: "Разрешен ли никнейм 'Продам обвесы/колеса, пишите в ЛС'?", a: "Да, такие никнеймы не нарушают правила." },
          { q: "Допускается ли продажа бизнесов за реальные деньги?", a: "Нет, продажа бизнеса за реальные деньги строго запрещена, исключений нет." },
          { q: "Разрешена ли реклама нефункционального бизнеса, например, кредитная компания?", a: "Нет, такая реклама запрещена, только функциональный бизнес подходит для публикации." },
          { q: "Можно ли рекламировать услуги, не связанные с сервером, например, продажу аккаунтов GTA 5?", a: "Нет, канала для рекламы услуг не существует." },
          { q: "Разрешено ли продавать/покупать варежки, которые имеют невидимую иконку в инвентаре?", a: "Нет. Данные варежки приравнены к невидимой одежде, так как не имеют иконки." },
          { q: "Можно ли публиковать объявление об продаже/обмене элемента одежды с трейд-локом?", a: "Нет, такие объявления запрещены для публикации." },
          { q: "В какой канал публикуется объявление о продаже предмета 'Медицинская сумка'?", a: "В категорию \"Прочее\"." },
          { q: "В какой канал публикуется объявление о поиске людей для помощи в выполнении квестов из БП?", a: "Такое сообщение допустимо в категории \"Поиск\"." },
          { q: "Разрешено ли написание транслитом в объявлениях?", a: "Нет, транслит запрещен." },
          { q: "В какой канал публикуется объявление о подселении? Разрешено ли арендовать дом с мастерской?", a: "Аренда дома публикуется в канал «Аренда». Нет, так как для использования мастерской необходим доступ к кладовке. Доспут к кладовке можно получитьь только через ключи, а сделки с ключами запрещены." },
          { q: "Допускаются ли элементы разных категорий на одном изображении?", a: "Нет. Каждое изображение должно отображать свою категорию." },
          { q: "В каких случаях необходимо указывать стоимость товара?", a: "При продаже товара." },
          { q: "В каком канале публикуется объявление о поиске владельца бизнеса?", a: "В разделе \"Бизнес\"." },
          { q: "Разрешено ли продавать двум людям один и тот же дом?", a: "Да, если нет нарушения КД в канале." },
          { q: "Как работает система тикетов на торговой площадке и можно ли через нее получить роль Approved?", a: "Система тикетов позволяет решать спорные ситуации с модераторами. Получение роли Approved через тикеты невозможно." },
          { q: "Можно ли продать обвес на автомобиль? В каком канале?", a: "Да, продажа обвесов допустима в канале \"Тюнинг\"." },
          { q: "Можно ли в объявлении о наборе в семью добавлять ссылку на семейный дискорд?", a: "Нет, так как канал семьи не является официальным ресурсом проекта." },
          { q: "Можно ли в канале 'Реклама' опубликовать видео своей стрельбы?", a: "Нет, ссылки на видеоролики и прочий материал, не связанный с официальными ресурсами - запрещен." }
        ];

        function App() {
          const [seniorNick, setSeniorNick] = useState('');
          const [candidates, setCandidates] = useState([
            { id: 1, name: 'Кандидат 1', info: '', answers: {} }
          ]);

          const topScrollRef = useRef(null);
          const tableScrollRef = useRef(null);
          const tableRef = useRef(null);
          const [tableWidth, setTableWidth] = useState(0);

          const handleTopScroll = () => {
            if (tableScrollRef.current && topScrollRef.current) {
              tableScrollRef.current.scrollLeft = topScrollRef.current.scrollLeft;
            }
          };

          const handleTableScroll = () => {
            if (topScrollRef.current && tableScrollRef.current) {
              topScrollRef.current.scrollLeft = tableScrollRef.current.scrollLeft;
            }
          };

          useEffect(() => {
            const observer = new ResizeObserver(entries => {
              for (let entry of entries) {
                setTableWidth(entry.target.scrollWidth);
              }
            });
            if (tableRef.current) observer.observe(tableRef.current);
            return () => observer.disconnect();
          }, [candidates]);

          useEffect(() => {
            if (window.lucide) window.lucide.createIcons();
          });

          const addCandidate = () => {
            const newId = candidates.length > 0 ? Math.max(...candidates.map(c => c.id)) + 1 : 1;
            setCandidates([...candidates, { id: newId, name: `Кандидат ${newId}`, info: '', answers: {} }]);
          };

          const removeCandidate = (id) => {
            setCandidates(candidates.filter(c => c.id !== id));
          };

          const updateCandidateField = (id, field, value) => {
            setCandidates(candidates.map(c => c.id === id ? { ...c, [field]: value } : c));
          };

          const updateAnswer = (candidateId, questionIndex, value) => {
            setCandidates(candidates.map(c => {
              if (c.id === candidateId) return { ...c, answers: { ...c.answers, [questionIndex]: value } };
              return c;
            }));
          };

          const exportToCSV = () => {
            let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; 
            if (seniorNick) csvContent += `Сеньор:;${seniorNick}\n\n`;
            const headers = ['ID', 'Вопрос', ...candidates.map(c => c.name)];
            csvContent += headers.join(';') + '\n';
            QUESTIONS_DATA.forEach((item, idx) => {
              if (item.isIntro) return;
              const row = [idx, `"${item.q.replace(/"/g, '""')}"`, ...candidates.map(c => `"${c.answers[idx] || ''}"`)];
              csvContent += row.join(';') + '\n';
            });
            const link = document.createElement("a");
            link.setAttribute("href", encodeURI(csvContent));
            link.setAttribute("download", `обзвон_ТП_${seniorNick || 'результаты'}.csv`);
            link.click();
          };

          const getSelectColor = (val) => {
            switch(val) {
              case 'да': return 'bg-emerald-50 text-emerald-700 border-emerald-200';
              case 'нет': return 'bg-rose-50 text-rose-700 border-rose-200';
              case '50/50': return 'bg-amber-50 text-amber-700 border-amber-200';
              case 'бред': return 'bg-slate-100 text-slate-600 border-slate-300';
              default: return 'bg-white text-slate-400 border-slate-200';
            }
          };

          return (
            <div className="min-h-screen p-4 md:p-10 text-slate-900">
              <div className="max-w-[1650px] mx-auto mb-8">
                <div className="bg-white rounded-3xl shadow-xl shadow-slate-200/50 overflow-hidden border border-white">
                  <div className="header-gradient p-8 text-white">
                    <div className="flex flex-col md:flex-row justify-between items-center gap-6">
                      <div className="flex items-center gap-5">
                        <div className="bg-white/20 p-4 rounded-2xl backdrop-blur-md">
                          <i data-lucide="shield-check" className="w-10 h-10"></i>
                        </div>
                        <div>
                          <h1 className="text-3xl font-extrabold tracking-tight">Обзвон на Торговую Площадку</h1>
                        </div>
                      </div>
                      <div className="flex flex-col sm:flex-row items-center gap-4 w-full md:w-auto">
                        <div className="relative w-full sm:w-72">
                          <i data-lucide="user" className="absolute left-4 top-1/2 -translate-y-1/2 text-white/60 w-4 h-4"></i>
                          <input 
                            type="text" placeholder="Никнейм сеньора..." value={seniorNick}
                            onChange={(e) => setSeniorNick(e.target.value)}
                            className="w-full pl-11 pr-4 py-3.5 bg-white/10 border border-white/20 rounded-2xl outline-none focus:bg-white/20 placeholder:text-white/50 text-white font-medium transition-all"
                          />
                        </div>
                        <div className="flex gap-2 w-full sm:w-auto">
                          <button onClick={addCandidate} className="flex-1 sm:flex-none flex items-center justify-center gap-2 bg-white text-indigo-600 px-6 py-3.5 rounded-2xl font-bold transition-all hover:scale-105 active:scale-95 shadow-lg">
                            <i data-lucide="user-plus" className="w-5 h-5"></i> Добавить
                          </button>
                          <button onClick={exportToCSV} className="flex-1 sm:flex-none flex items-center justify-center gap-2 bg-indigo-500/30 text-white border border-white/30 px-6 py-3.5 rounded-2xl font-bold transition-all hover:bg-indigo-500/50 backdrop-blur-sm">
                            <i data-lucide="file-down" className="w-5 h-5"></i> Отчет
                          </button>
                        </div>
                      </div>
                    </div>
                  </div>
                  <div className="bg-slate-50/80 p-5 px-8 flex items-start gap-4 border-t border-slate-100">
                    <i data-lucide="message-square" className="w-5 h-5 text-indigo-500 mt-1 shrink-0"></i>
                    <p className="text-slate-600 italic font-medium leading-relaxed">
                      "Приветствую. Представьтесь пожалуйста, расскажите о себе, как вас зовут и сколько вам лет?"
                    </p>
                  </div>
                </div>
              </div>

              <div className="max-w-[1650px] mx-auto bg-white rounded-[32px] shadow-2xl shadow-slate-200/60 border border-slate-200/60 overflow-hidden">
                <div 
                  ref={topScrollRef}
                  onScroll={handleTopScroll}
                  className="overflow-x-auto custom-scrollbar border-b border-slate-100 bg-slate-50/50"
                  style={{ height: '10px' }}
                >
                  <div style={{ width: `${tableWidth}px`, height: '1px' }}></div>
                </div>

                <div 
                  ref={tableScrollRef}
                  onScroll={handleTableScroll}
                  className="overflow-x-auto custom-scrollbar"
                >
                  <table ref={tableRef} className="w-full text-left border-collapse table-fixed">
                    <thead>
                      <tr className="bg-slate-50/80 backdrop-blur-sm">
                        <th className="p-6 border-b border-slate-200 font-bold text-slate-400 w-16 text-center uppercase text-xs tracking-widest"></th>
                        <th className="p-6 border-b border-slate-200 font-bold text-slate-500 w-[550px] uppercase text-xs tracking-widest">Вопросы для кандидатов и ответы</th>
                        {candidates.map((candidate) => (
                          <th key={candidate.id} className="border-b border-l border-slate-200 w-[300px] p-0 group">
                            <div className="p-6">
                              <div className="flex items-center justify-between gap-2 mb-4">
                                <input 
                                  type="text" value={candidate.name}
                                  onChange={(e) => updateCandidateField(candidate.id, 'name', e.target.value)}
                                  className="bg-slate-100/50 font-extrabold text-slate-800 border-2 border-transparent p-2.5 w-full rounded-xl outline-none text-sm focus:border-indigo-400 focus:bg-white transition-all"
                                />
                                {candidates.length > 1 && (
                                  <button onClick={() => removeCandidate(candidate.id)} className="text-slate-300 hover:text-rose-500 transition-all p-2 bg-slate-100 rounded-xl hover:bg-rose-50">
                                    <i data-lucide="trash-2" className="w-4 h-4"></i>
                                  </button>
                                )}
                              </div>
                              <textarea 
                                placeholder="Информация о кандидате..." 
                                rows="3" 
                                value={candidate.info}
                                onChange={(e) => updateCandidateField(candidate.id, 'info', e.target.value)}
                                className="w-full p-3 text-xs bg-slate-50 border-2 border-slate-100 rounded-xl outline-none resize-none focus:border-indigo-200 focus:bg-white transition-all shadow-inner placeholder:text-slate-400"
                              />
                            </div>
                          </th>
                        ))}
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100">
                      {QUESTIONS_DATA.map((item, qIndex) => {
                        if (item.isIntro) return null;
                        return (
                          <tr key={qIndex} className="group hover:bg-slate-50/40 transition-all">
                            <td className="p-6 text-center text-slate-300 font-black text-lg italic align-top">{qIndex}</td>
                            <td className="p-6 align-top">
                              <div className="text-slate-800 font-bold mb-4 text-[15px] leading-snug group-hover:text-indigo-900 transition-colors">{item.q}</div>
                              <div className="relative pl-5 py-3 pr-4 bg-emerald-50/50 rounded-2xl border border-emerald-100/80">
                                <div className="absolute left-0 top-0 bottom-0 w-1.5 bg-emerald-400 rounded-l-2xl"></div>
                                <span className="font-bold text-emerald-600 block mb-1 uppercase text-[10px] tracking-wider">Эталонный ответ:</span>
                                <p className="text-[13px] text-emerald-900 leading-relaxed font-medium">{item.a}</p>
                              </div>
                            </td>
                            {candidates.map(candidate => (
                              <td key={`${candidate.id}-${qIndex}`} className="border-l border-slate-100 p-6 align-top">
                                <div className="relative">
                                  <select
                                    value={candidate.answers[qIndex] || ''}
                                    onChange={(e) => updateAnswer(candidate.id, qIndex, e.target.value)}
                                    className={`w-full p-4 border-2 rounded-2xl outline-none font-bold text-sm cursor-pointer shadow-sm transition-all appearance-none ${getSelectColor(candidate.answers[qIndex])}`}
                                  >
                                    <option value="" disabled>Оценить ответ</option>
                                    <option value="да">✓ Верно</option>
                                    <option value="нет">✕ Неверно</option>
                                    <option value="50/50">⚠ Частично</option>
                                    <option value="бред">? Бред / Ошибка</option>
                                  </select>
                                  <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none opacity-30">
                                    <i data-lucide="chevron-down" className="w-4 h-4"></i>
                                  </div>
                                </div>
                              </td>
                            ))}
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
