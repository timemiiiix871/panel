<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Обзвон на Торговую Площадку</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f3f4f9; font-size: 19px; } /* Увеличено на ~3 пункта */
        .tab-active { border-bottom: 4px solid #4f46e5; color: #4f46e5; background: white; }
        .sticky-col { position: sticky; left: 0; z-index: 20; background: white; border-right: 1px solid #e2e8f0; }
        .sticky-col-2 { position: sticky; left: 80px; z-index: 20; background: white; box-shadow: 4px 0 6px -1px rgba(0,0,0,0.05); }
        .custom-scrollbar::-webkit-scrollbar { height: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        input, select, textarea { font-size: 18px !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const firebaseConfig = {
          apiKey: "AIzaSyAJKSAClBMKAVhEyiLu4PyRNkV6tye2FbU",
          authDomain: "market-c4087.firebaseapp.com",
          projectId: "market-c4087",
          storageBucket: "market-c4087.firebasestorage.app",
          messagingSenderId: "388070354779",
          appId: "1:388070354779:web:47ccda63f50bd1bcb7347e",
          databaseURL: "https://market-c4087-default-rtdb.europe-west1.firebasedatabase.app"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const QUESTIONS = [
          { q: "Разрешено ли публиковать объявление с покупкой/продажей «Пустого номера»?", a: "Нет, запрещено (п.11 правил)." },
          { q: "В каком канале публикуется объявление об обмене автомобиля на рюкзак?", a: "Допустимого канала нет." },
          { q: "Сколько слов Caps Lock можно написать?", a: "Максимум 3 слова." },
          { q: "Допустима ли купля/продажа номеров с запретными словами?", a: "Нет, они модерируются." },
          { q: "Разрешено ли объявление не на языке сервера?", a: "Нет, только на русском." },
          { q: "Макс. кол-во машин в одном объявлении?", a: "Не более 5 авто." },
          { q: "Разрешено ли продавать ключи от авто?", a: "Нет, запрещено." },
          { q: "Допускаются ли объявления о покупке/продаже семьи?", a: "Нет, нет функционала передачи." },
          { q: "Итоговый вердикт по кандидату:", a: "Подходит ли человек на пост?", isFinal: true }
        ];

        function App() {
          const [sessions, setSessions] = useState({});
          const [activeId, setActiveId] = useState('');
          const [loading, setLoading] = useState(true);

          useEffect(() => {
            const ref = db.ref('recruitment_sessions');
            ref.on('value', (snapshot) => {
              const data = snapshot.val() || {};
              setSessions(data);
              if (!activeId && Object.keys(data).length > 0) setActiveId(Object.keys(data)[0]);
              setLoading(false);
              setTimeout(() => { if(window.lucide) window.lucide.createIcons(); }, 100);
            });
            return () => ref.off();
          }, [activeId]);

          const addSession = () => {
            const name = prompt('Введите имя рекрутера:');
            if (!name) return;
            const id = 'session_' + Date.now();
            db.ref('recruitment_sessions/' + id).set({
              id, recruiter: name, candidates: [{ id: Date.now(), name: "Кандидат 1", info: "", answers: {} }]
            });
            setActiveId(id);
          };

          const renameSession = (id) => {
            const newName = prompt('Новое имя рекрутера:', sessions[id].recruiter);
            if (newName) db.ref(`recruitment_sessions/${id}/recruiter`).set(newName);
          };

          const deleteSession = (id) => {
            if (confirm('Удалить этого рекрутера и все его данные?')) {
              db.ref(`recruitment_sessions/${id}`).remove();
              setActiveId('');
            }
          };

          const addCandidate = () => {
            if (!activeId) return;
            const newC = { id: Date.now(), name: "Кандидат " + ((sessions[activeId].candidates?.length || 0) + 1), info: "", answers: {} };
            const currentCandidates = sessions[activeId].candidates || [];
            db.ref(`recruitment_sessions/${activeId}/candidates`).set([...currentCandidates, newC]);
          };

          const updateCandidate = (cIdx, field, val) => {
            db.ref(`recruitment_sessions/${activeId}/candidates/${cIdx}/${field}`).set(val);
          };

          const updateAnswer = (cIdx, qIdx, val) => {
            db.ref(`recruitment_sessions/${activeId}/candidates/${cIdx}/answers/${qIdx}`).set(val);
          };

          const exportCSV = () => {
            const current = sessions[activeId];
            if (!current) return;
            
            let csv = "data:text/csv;charset=utf-8,\uFEFF";
            csv += `Рекрутер: ${current.recruiter}\n\n`;
            
            const headers = ["Вопрос", ...current.candidates.map(c => c.name)];
            csv += headers.join(";") + "\n";

            const infoRow = ["ИНФО КАНДИДАТА", ...current.candidates.map(c => `"${c.info.replace(/"/g, '""')}"`)];
            csv += infoRow.join(";") + "\n";

            QUESTIONS.forEach((q, idx) => {
              const row = [q.q, ...current.candidates.map(c => c.answers?.[idx] || "-")];
              csv += row.join(";") + "\n";
            });

            const link = document.createElement("a");
            link.setAttribute("href", encodeURI(csv));
            link.setAttribute("download", `Отчет_${current.recruiter}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
          };

          if (loading) return <div className="flex h-screen items-center justify-center font-bold">Загрузка данных...</div>;

          const current = sessions[activeId];

          return (
            <div className="p-4 md:p-8 max-w-[1800px] mx-auto">
              {/* Header */}
              <div className="mb-6 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div className="p-8 bg-indigo-700 text-white">
                  <h1 className="text-3xl font-black mb-4 flex items-center gap-3">
                    <i data-lucide="shopping-cart"></i> Обзвон на Торговую Площадку
                  </h1>
                  <div className="bg-white/10 p-4 rounded-xl border border-white/20 text-indigo-50 italic">
                    "Приветствую. Вы попали на обзвон на пост модератора торговой площадки. Представьтесь пожалуйста, расскажите о себе, как вас зовут и сколько вам лет."
                  </div>
                  <div className="mt-6 flex justify-between items-end">
                    <div className="flex gap-2 overflow-x-auto">
                        {Object.values(sessions).map(s => (
                            <div key={s.id} className="relative group">
                                <button 
                                    onClick={() => setActiveId(s.id)} 
                                    className={`px-6 py-3 rounded-t-lg font-bold text-lg transition-all ${activeId === s.id ? 'bg-white text-indigo-700' : 'bg-indigo-800 text-indigo-300 hover:bg-indigo-600'}`}
                                >
                                    {s.recruiter}
                                </button>
                                {activeId === s.id && (
                                    <div className="absolute -top-2 -right-2 flex gap-1">
                                        <button onClick={() => renameSession(s.id)} className="p-1 bg-amber-500 rounded-full shadow-md hover:bg-amber-600"><i data-lucide="edit-3" className="w-3 h-3"></i></button>
                                        <button onClick={() => deleteSession(s.id)} className="p-1 bg-rose-500 rounded-full shadow-md hover:bg-rose-600"><i data-lucide="trash-2" className="w-3 h-3"></i></button>
                                    </div>
                                )}
                            </div>
                        ))}
                        <button onClick={addSession} className="px-4 py-3 text-white hover:text-emerald-400 transition-colors"><i data-lucide="plus-circle"></i></button>
                    </div>
                    <div className="flex gap-3 pb-2">
                        <button onClick={addCandidate} className="bg-emerald-500 hover:bg-emerald-600 px-6 py-3 rounded-xl font-bold flex items-center gap-2 transition-all">
                            <i data-lucide="user-plus"></i> + Кандидат
                        </button>
                        <button onClick={exportCSV} className="bg-white text-slate-800 hover:bg-slate-100 px-6 py-3 rounded-xl font-bold flex items-center gap-2 transition-all shadow-lg">
                            <i data-lucide="file-text"></i> Отчет
                        </button>
                    </div>
                  </div>
                </div>
              </div>

              {current ? (
                <div className="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
                  <div className="overflow-x-auto custom-scrollbar">
                    <table className="w-full border-collapse">
                      <thead>
                        <tr className="bg-slate-50 border-b">
                          <th className="p-6 w-20 sticky-col text-slate-400 font-black">#</th>
                          <th className="p-6 w-[500px] sticky-col-2 bg-slate-50 text-slate-500 text-left font-black">ВОПРОС / ТЕКСТ</th>
                          {current.candidates?.map((c, idx) => (
                            <th key={c.id} className="p-6 w-[350px] border-l min-w-[320px]">
                              <input 
                                className="font-black text-indigo-700 w-full outline-none bg-transparent text-xl border-b-2 border-transparent focus:border-indigo-300" 
                                value={c.name} 
                                onChange={(e) => updateCandidate(idx, 'name', e.target.value)} 
                              />
                              <textarea 
                                className="w-full mt-3 p-3 text-base bg-slate-100 rounded-xl outline-none resize-none border border-slate-200 focus:bg-white transition-all" 
                                placeholder="Инфо о кандидате..." 
                                rows="3"
                                value={c.info || ''} 
                                onChange={(e) => updateCandidate(idx, 'info', e.target.value)} 
                              />
                            </th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {QUESTIONS.map((q, qIdx) => (
                          <tr key={qIdx} className={`border-b hover:bg-slate-50/50 transition-colors ${q.isFinal ? 'bg-indigo-50/30' : ''}`}>
                            <td className="p-6 text-center text-slate-300 font-black sticky-col text-xl">{q.isFinal ? '★' : qIdx + 1}</td>
                            <td className="p-6 sticky-col-2 bg-white">
                                <div className="font-bold text-slate-800 leading-tight mb-2 text-lg">{q.q}</div>
                                {q.a && <div className="text-sm text-emerald-600 font-bold uppercase tracking-wider">Подсказка: {q.a}</div>}
                            </td>
                            {current.candidates?.map((c, cIdx) => (
                              <td key={c.id} className="p-6 border-l">
                                <select 
                                  className={`w-full p-4 border-2 rounded-2xl font-black outline-none cursor-pointer transition-all ${
                                    c.answers?.[qIdx] === 'да' ? 'bg-emerald-50 border-emerald-200 text-emerald-700' : 
                                    c.answers?.[qIdx] === 'нет' ? 'bg-rose-50 border-rose-200 text-rose-700' : 
                                    'bg-white border-slate-100 text-slate-400'
                                  }`}
                                  value={c.answers?.[qIdx] || ''}
                                  onChange={(e) => updateAnswer(cIdx, qIdx, e.target.value)}
                                >
                                  <option value="">Оценить</option>
                                  {q.isFinal ? (
                                    <>
                                      <option value="да">ПОДХОДИТ</option>
                                      <option value="нет">НЕ ПОДХОДИТ</option>
                                    </>
                                  ) : (
                                    <>
                                      <option value="да">ВЕРНО</option>
                                      <option value="нет">НЕВЕРНО</option>
                                      <option value="50/50">50 / 50</option>
                                    </>
                                  )}
                                </select>
                              </td>
                            ))}
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                  
                  {/* Footer Text */}
                  <div className="p-10 bg-slate-900 text-white">
                    <div className="max-w-2xl mx-auto text-center">
                        <div className="text-emerald-400 font-bold mb-4 flex justify-center"><i data-lucide="check-circle" className="w-10 h-10"></i></div>
                        <p className="text-xl leading-relaxed italic opacity-90">
                            "Вы успешно завершили обзвон. Результаты будут оглашены после обзвона других кандидатов в новостях торговой площадки. Желаем удачи!"
                        </p>
                    </div>
                  </div>
                </div>
              ) : (
                <div className="text-center p-20 bg-white rounded-2xl border-2 border-dashed border-slate-300 text-slate-400 font-bold">
                    Выберите рекрутера или создайте нового, чтобы начать работу
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
