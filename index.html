<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обзвон на ТП | Командная Панель</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .lucide { width: 1.2em; height: 1.2em; vertical-align: middle; }
        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f8fafc; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .header-gradient { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
        .sticky-col { position: sticky; left: 0; z-index: 20; background: white; }
        .sticky-col-2 { position: sticky; left: 64px; z-index: 20; background: white; }
        tr:hover .sticky-col, tr:hover .sticky-col-2 { background: #f8fafc; }
        .tab-active { border-bottom: 4px solid #4f46e5; color: #4f46e5; background: white; }
    </style>
</head>
<body class="bg-[#f3f4f9]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const QUESTIONS_DATA = [
          { q: "Представьтесь, пожалуйста, расскажите о себе: как вас зовут и сколько вам лет?", isIntro: true },
          { q: "Разрешено ли публиковать объявление с покупкой/продажей «Пустого номера»?", a: "Нет, продажа пустого номера запрещена и наказывается 11-м пунктом правил." },
          { q: "В каком канале публикуется объявление об обмене автомобиля на тактический рюкзак?", a: "Допустимого канала для такого рода объявлений нет." },
          { q: "Сколько слов Caps Lock можно написать в одном объявлении?", a: "Максимум 3 слова можно написать Caps Lock." },
          { q: "Допустима ли купля/продажа номеров на транспорт с указанием запретных слов?", a: "Нет, использование запретных слов на номерах недопустимо, поскольку они так же модерируются." },
          { q: "Разрешается ли делать пропуски после каждой написанной строки в объявлении?", a: "Нет, так как пропуски через каждую строку текста искусственно увеличивают объем текста." },
          { q: "Разрешено ли объявление не на языке сервера?", a: "Язык общения на сервере — русский. Объявления должны быть написаны на языке сервера." },
          { q: "Какое максимальное количество транспортных средств можно упомянуть в одном объявлении при купле/продаже?", a: "Не более 5 авто. Неопределенная марка авто или выкуп авто приравниваются к единице транспортного средства." },
          { q: "Разрешено ли продавать ключи от авто?", a: "Нет, такие действия запрещены." },
          { q: "Допускаются ли объявления о покупке/продаже семьи?", a: "Подобные объявления не допускаются, так как нет функционала, способного передать семью." },
          { q: "Пользователь опубликовал объявление о продаже «АЗС №2» за 3 млн. А ниже пользователь пишет, что купит данный бизнес за 2 млн. Считается ли это нарушением?", a: "Да. Если владелец бизнеса опубликовал объявление о продаже, ему необходимо писать в личные сообщения для торгов. Иные объявления о купле с занижением цены считаются неприемлемыми." },
          { q: "На какой максимальный срок можно сдать транспорт в аренду?", a: "Транспорт можно сдавать в аренду не более чем на 7 дней." },
          { q: "Разрешается ли заключать OOC-договор на сервере?", a: "Нет, такие действия запрещены." },
          { q: "Разрешен ли никнейм «Продам обвесы/колеса, пишите в ЛС»?", a: "Да, такие никнеймы не нарушают правила." },
          { q: "Допускается ли продажа бизнесов за реальные деньги?", a: "Нет, продажа бизнеса за реальные деньги строго запрещена, исключений нет." },
          { q: "Разрешена ли реклама нефункционального бизнеса, например, кредитной компании?", a: "Нет, такая реклама запрещена. Только функциональный бизнес подходит для публикации." },
          { q: "Можно ли рекламировать услуги, не связанные с сервером, например, услуги дизайна?", a: "Нет, канала для рекламы подобных услуг не существует." },
          { q: "Разрешено ли продавать/покупать варежки, которые имеют невидимую иконку в инвентаре?", a: "Нет. Данные варежки приравнены к невидимой одежде, так как не имеют иконки." },
          { q: "Можно ли публиковать объявление о продаже/обмене элемента одежды с трейд-локом?", a: "Нет, такие объявления запрещены для публикации." },
          { q: "В какой канал публикуется объявление о продаже предмета «Медицинская сумка»?", a: "В категорию «Прочее»." },
          { q: "В какой канал публикуется объявление о поиске людей для помощи в выполнении квестов из БП?", a: "Такое сообщение допустимо в категории «Поиск»." },
          { q: "Разрешено ли написание транслитом в объявлениях?", a: "Нет, транслит запрещен." },
          { q: "В какой канал публикуется объявление о подселении? Разрешено ли арендовать дом с мастерской?", a: "Аренда дома публикуется в канал «Аренда». Арендовать с мастерской нельзя, так как для использования мастерской необходим доступ к кладовке, который получается через передачу ключей, а сделки с ключами запрещены." },
          { q: "Допускаются ли элементы разных категорий на одном изображении?", a: "Нет. Каждое изображение должно отображать свою категорию." },
          { q: "В каких случаях необходимо указывать стоимость товара?", a: "При продаже товара." },
          { q: "В каком канале публикуется объявление о поиске владельца бизнеса?", a: "В разделе «Бизнес»." },
          { q: "Могут ли два пользователя публиковать объявления о продаже одно и того же дома?", a: "Да, если нет нарушения КД в канале." },
          { q: "Для чего нужны тикеты на торговой площадке и можно ли через них получить роль Approved?", a: "Система тикетов позволяет решать спорные ситуации с модераторами. Получение роли Approved через тикеты невозможно." },
          { q: "Можно ли продать обвес на автомобиль? В каком канале?", a: "Да, продажа обвесов допустима в канале «Тюнинг»." },
          { q: "Можно ли в объявлении о наборе в семью добавлять ссылку на семейный Discord?", a: "Нет, так как канал семьи не является официальным ресурсом проекта." },
          { q: "Можно ли в канале «Реклама» опубликовать видео своей стрельбы?", a: "Нет, ссылки на видеоролики и прочий материал, не связанный с официальными ресурсами, запрещены." },
          { q: "Итоговый вердикт по кандидату:", a: "Определите, подходит ли данный пользователь на должность модератора.", isFinal: true }
        ];

        function App() {
          // Состояние для всех сессий (рекрутеров)
          const [sessions, setSessions] = useState(() => {
            const saved = localStorage.getItem('tp_sessions');
            return saved ? JSON.parse(saved) : [{ id: 'default', recruiter: 'Recruiter 1', candidates: [{ id: 1, name: 'Кандидат 1', info: '', answers: {} }] }];
          });
          
          const [activeSessionId, setActiveSessionId] = useState(() => localStorage.getItem('tp_active_session') || 'default');
          const [seniorNick, setSeniorNick] = useState(() => localStorage.getItem('tp_senior_nick') || '');

          const tableScrollRef = useRef(null);
          const topScrollRef = useRef(null);

          // Сохранение в LocalStorage
          useEffect(() => {
            localStorage.setItem('tp_sessions', JSON.stringify(sessions));
            localStorage.setItem('tp_active_session', activeSessionId);
            localStorage.setItem('tp_senior_nick', seniorNick);
            if (window.lucide) window.lucide.createIcons();
          }, [sessions, activeSessionId, seniorNick]);

          const activeSession = sessions.find(s => s.id === activeSessionId) || sessions[0];

          // Управление сессиями (вкладками)
          const addSession = () => {
            const name = prompt('Введите имя рекрутера:');
            if (!name) return;
            const newId = Date.now().toString();
            setSessions([...sessions, { id: newId, recruiter: name, candidates: [{ id: 1, name: 'Кандидат 1', info: '', answers: {} }] }]);
            setActiveSessionId(newId);
          };

          const removeSession = (id, e) => {
            e.stopPropagation();
            if (sessions.length === 1) return;
            if (confirm('Удалить всю сессию этого рекрутера?')) {
              const filtered = sessions.filter(s => s.id !== id);
              setSessions(filtered);
              setActiveSessionId(filtered[0].id);
            }
          };

          // Управление кандидатами внутри сессии
          const addCandidate = () => {
            setSessions(sessions.map(s => {
              if (s.id === activeSessionId) {
                const newId = s.candidates.length > 0 ? Math.max(...s.candidates.map(c => c.id)) + 1 : 1;
                return { ...s, candidates: [...s.candidates, { id: newId, name: `Кандидат ${newId}`, info: '', answers: {} }] };
              }
              return s;
            }));
          };

          const updateCandidateField = (candidateId, field, value) => {
            setSessions(sessions.map(s => {
              if (s.id === activeSessionId) {
                return { ...s, candidates: s.candidates.map(c => c.id === candidateId ? { ...c, [field]: value } : c) };
              }
              return s;
            }));
          };

          const updateAnswer = (candidateId, questionIndex, value) => {
            setSessions(sessions.map(s => {
              if (s.id === activeSessionId) {
                return { ...s, candidates: s.candidates.map(c => 
                  c.id === candidateId ? { ...c, answers: { ...c.answers, [questionIndex]: value } } : c
                )};
              }
              return s;
            }));
          };

          const exportToCSV = () => {
            let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; 
            csvContent += `Сеньор:;${seniorNick};Рекрутер:;${activeSession.recruiter}\n\n`;
            
            // Заголовки: ID, Вопрос, Имена кандидатов
            const headers = ['ID', 'Вопрос / Ответ', ...activeSession.candidates.map(c => c.name)];
            csvContent += headers.join(';') + '\n';

            // НОВАЯ СТРОКА: Информация о кандидатах
            const infoRow = ['', 'ИНФОРМАЦИЯ О КАНДИДАТЕ', ...activeSession.candidates.map(c => `"${(c.info || '').replace(/"/g, '""')}"`)];
            csvContent += infoRow.join(';') + '\n\n';

            // Данные по вопросам
            QUESTIONS_DATA.forEach((item, idx) => {
              if (item.isIntro) return;
              const row = [idx, `"${item.q.replace(/"/g, '""')}"`, ...activeSession.candidates.map(c => `"${c.answers[idx] || ''}"`)];
              csvContent += row.join(';') + '\n';
            });

            const link = document.createElement("a");
            link.setAttribute("href", encodeURI(csvContent));
            link.setAttribute("download", `Отчет_${activeSession.recruiter}_${new Date().toLocaleDateString()}.csv`);
            link.click();
          };

          const getSelectColor = (val) => {
            switch(val) {
              case 'да': case 'подходит': return 'bg-emerald-50 text-emerald-700 border-emerald-200';
              case 'нет': case 'не подходит': return 'bg-rose-50 text-rose-700 border-rose-200';
              case '50/50': case 'возможно подходит': return 'bg-amber-50 text-amber-700 border-amber-200';
              default: return 'bg-white text-slate-400 border-slate-200';
            }
          };

          return (
            <div className="min-h-screen p-4 md:p-8 text-slate-900">
              {/* Header */}
              <div className="max-w-[1800px] mx-auto mb-6">
                <div className="bg-white rounded-3xl shadow-xl overflow-hidden">
                  <div className="header-gradient p-6 text-white flex flex-col md:flex-row justify-between items-center gap-4">
                    <div className="flex items-center gap-4">
                       <i data-lucide="layout-dashboard" className="w-8 h-8 opacity-80"></i>
                       <h1 className="text-2xl font-bold">Shift Lead Panel</h1>
                       <input 
                         type="text" placeholder="Ник Сеньора..." 
                         value={seniorNick} onChange={(e) => setSeniorNick(e.target.value)}
                         className="ml-4 bg-white/10 border border-white/20 rounded-xl px-4 py-2 outline-none focus:bg-white/20"
                       />
                    </div>
                    <div className="flex gap-3">
                       <button onClick={addCandidate} className="bg-white text-indigo-600 px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 hover:scale-105 transition-transform">
                         <i data-lucide="user-plus" className="w-4 h-4"></i> + Кандидат
                       </button>
                       <button onClick={exportToCSV} className="bg-emerald-500 text-white px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 hover:bg-emerald-600 transition-colors">
                         <i data-lucide="download" className="w-4 h-4"></i> CSV Отчет
                       </button>
                    </div>
                  </div>

                  {/* Tabs System */}
                  <div className="bg-slate-100 flex items-center px-4 overflow-x-auto custom-scrollbar border-b">
                    {sessions.map(s => (
                      <div 
                        key={s.id} 
                        onClick={() => setActiveSessionId(s.id)}
                        className={`px-6 py-4 cursor-pointer font-bold text-sm transition-all flex items-center gap-3 whitespace-nowrap ${activeSessionId === s.id ? 'tab-active' : 'text-slate-500 hover:bg-slate-200'}`}
                      >
                        <i data-lucide="user" className="w-4 h-4"></i>
                        {s.recruiter}
                        <button onClick={(e) => removeSession(s.id, e)} className="ml-2 hover:text-rose-500 opacity-50 hover:opacity-100">
                          <i data-lucide="x" className="w-3 h-3"></i>
                        </button>
                      </div>
                    ))}
                    <button onClick={addSession} className="ml-4 p-2 text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors" title="Добавить рекрутера">
                      <i data-lucide="plus-circle" className="w-6 h-6"></i>
                    </button>
                  </div>
                </div>
              </div>

              {/* Main Table */}
              <div className="max-w-[1800px] mx-auto bg-white rounded-[24px] shadow-xl border border-slate-200 overflow-hidden">
                <div className="overflow-x-auto custom-scrollbar" ref={tableScrollRef}>
                  <table className="w-full text-left border-collapse table-fixed">
                    <thead>
                      <tr className="bg-slate-50">
                        <th className="p-4 w-16 sticky-col border-r text-center text-slate-400 text-xs uppercase font-black">#</th>
                        <th className="p-4 w-[500px] sticky-col-2 shadow-md bg-slate-50 text-slate-500 text-xs uppercase font-black">Вопросы и Ответы</th>
                        {activeSession.candidates.map((candidate) => (
                          <th key={candidate.id} className="border-l border-slate-200 w-[320px] p-4 bg-white">
                            <input 
                              type="text" value={candidate.name}
                              onChange={(e) => updateCandidateField(candidate.id, 'name', e.target.value)}
                              className="font-black text-slate-800 border-none p-0 w-full outline-none text-lg focus:text-indigo-600 mb-2"
                            />
                            <textarea 
                              placeholder="Заметки о кандидате (опыт, в какой фракции и т.д.)..." 
                              rows="3" 
                              value={candidate.info}
                              onChange={(e) => updateCandidateField(candidate.id, 'info', e.target.value)}
                              className="w-full p-3 text-xs bg-slate-50 border border-slate-100 rounded-xl outline-none resize-none focus:bg-white focus:border-indigo-200"
                            />
                          </th>
                        ))}
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100">
                      {QUESTIONS_DATA.map((item, qIndex) => {
                        if (item.isIntro) return null;
                        const isFinal = item.isFinal;
                        return (
                          <tr key={qIndex} className={`group hover:bg-slate-50/50 ${isFinal ? 'bg-indigo-50/20' : ''}`}>
                            <td className="p-4 text-center text-slate-300 font-bold sticky-col border-r">{isFinal ? '★' : qIndex}</td>
                            <td className="p-5 sticky-col-2 shadow-md bg-white group-hover:bg-slate-50">
                              <div className="font-bold text-slate-800 mb-2 text-sm">{item.q}</div>
                              <div className="text-xs text-emerald-600 bg-emerald-50 p-3 rounded-lg border border-emerald-100 font-medium">
                                <strong>ОТВЕТ:</strong> {item.a}
                              </div>
                            </td>
                            {activeSession.candidates.map(candidate => (
                              <td key={`${candidate.id}-${qIndex}`} className="p-4 border-l border-slate-100">
                                <select
                                  value={candidate.answers[qIndex] || ''}
                                  onChange={(e) => updateAnswer(candidate.id, qIndex, e.target.value)}
                                  className={`w-full p-4 border-2 rounded-2xl font-bold text-sm outline-none transition-all cursor-pointer ${getSelectColor(candidate.answers[qIndex])}`}
                                >
                                  <option value="">Оценить...</option>
                                  {!isFinal ? (
                                    <>
                                      <option value="да">✓ Верно</option>
                                      <option value="нет">✕ Неверно</option>
                                      <option value="50/50">⚠ Частично</option>
                                    </>
                                  ) : (
                                    <>
                                      <option value="подходит">★ Подходит</option>
                                      <option value="возможно подходит">● Возможно подходит</option>
                                      <option value="не подходит">✕ Не подходит</option>
                                    </>
                                  )}
                                </select>
                              </td>
                            ))}
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
