<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обзвон на Торговую Площадку</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f3f4f9; font-size: 14px; } 
        
        .tab-active { border-bottom: 4px solid #4f46e5; color: #4f46e5; background: white; }
        
        /* Фиксированные колонки с жестким белым фоном */
        .sticky-col { 
            position: sticky; 
            left: 0; 
            z-index: 30; 
            background-color: #ffffff !important; 
            border-right: 1px solid #e2e8f0; 
        }
        .sticky-col-2 { 
            position: sticky; 
            left: 80px; 
            z-index: 30; 
            background-color: #ffffff !important; 
            box-shadow: 5px 0 10px -5px rgba(0,0,0,0.1); 
        }
        
        thead th.sticky-col { z-index: 40; background-color: #f8fafc !important; }
        thead th.sticky-col-2 { z-index: 40; background-color: #f8fafc !important; }

        tr:hover .sticky-col, tr:hover .sticky-col-2 {
            background-color: #f8fafc !important;
        }

        .custom-scrollbar::-webkit-scrollbar { height: 10px; width: 10px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        input, select, textarea { font-size: 18px !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
          apiKey: "AIzaSyAJKSAClBMKAVhEyiLu4PyRNkV6tye2FbU",
          authDomain: "market-c4087.firebaseapp.com",
          projectId: "market-c4087",
          storageBucket: "market-c4087.firebasestorage.app",
          messagingSenderId: "388070354779",
          appId: "1:388070354779:web:47ccda63f50bd1bcb7347e",
          databaseURL: "https://market-c4087-default-rtdb.europe-west1.firebasedatabase.app"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const QUESTIONS = [
          { q: "Представьтесь, пожалуйста, расскажите о себе: как вас зовут и сколько вам лет?", isIntro: true },
          { q: "Разрешено ли публиковать объявление с покупкой/продажей «Пустого номера»?", a: "Нет, продажа пустого номера запрещена и наказывается 11-м пунктом правил." },
          { q: "В каком канале публикуется объявление об обмене автомобиля на тактический рюкзак?", a: "Допустимого канала для такого рода объявлений нет." },
          { q: "Сколько слов Caps Lock можно написать в одном объявлении?", a: "Максимум 3 слова можно написать Caps Lock." },
          { q: "Допустима ли купля/продажа номеров на транспорт с указанием запретных слов?", a: "Нет, использование запретных слов на номерах недопустимо, поскольку они так же модерируются." },
          { q: "Разрешается ли делать пропуски после каждой написанной строки в объявлении?", a: "Нет, так как пропуски через каждую строку текста искусственно увеличивают объем текста." },
          { q: "Разрешено ли объявление не на языке сервера?", a: "Язык общения на сервере — русский. Объявления должны быть написаны на языке сервера." },
          { q: "Какое максимальное количество транспортных средств можно упомянуть в одном объявлении при купле/продаже?", a: "Не более 5 авто. Неопределенная марка авто или выкуп авто приравниваются к единице транспортного средства." },
          { q: "Разрешено ли продавать ключи от авто?", a: "Нет, такие действия запрещены." },
          { q: "Допускаются ли объявления о покупке/продаже семьи?", a: "Подобные объявления не допускаются, так как нет функционала, способного передать семью." },
          { q: "Пользователь опубликовал объявление о продаже «АЗС №2» за 3 млн. А ниже пользователь пишет, что купит данный бизнес за 2 млн. Считается ли это нарушением?", a: "Да. Если владелец бизнеса опубликовал объявление о продаже, ему необходимо писать в личные сообщения для торгов. Иные объявления о купле с занижением цены считаются неприемлемыми." },
          { q: "На какой максимальный срок можно сдать транспорт в аренду?", a: "Транспорт можно сдавать в аренду не более чем на 7 дней." },
          { q: "Разрешается ли заключать OOC-договор на сервере?", a: "Нет, такие действия запрещены." },
          { q: "Разрешен ли никнейм «Продам обвесы/колеса, пишите в ЛС»?", a: "Да, такие никнеймы не нарушают правила." },
          { q: "Допускается ли продажа бизнесов за реальные деньги?", a: "Нет, продажа бизнеса за реальные деньги строго запрещена, исключений нет." },
          { q: "Разрешена ли реклама нефункционального бизнеса, например, кредитной компании?", a: "Нет, такая реклама запрещена. Только функциональный бизнес подходит для публикации." },
          { q: "Можно ли рекламировать услуги, не связанные с сервером, например, услуги дизайна?", a: "Нет, канала для рекламы подобных услуг не существует." },
          { q: "Разрешено ли продавать/покупать варежки, которые имеют невидимую иконку в инвентаре?", a: "Нет. Данные варежки приравнены к невидимой одежде, так как не имеют иконки." },
          { q: "Можно ли публиковать объявление о продаже/обмене элемента одежды с трейд-локом?", a: "Нет, такие объявления запрещены для публикации." },
          { q: "В какой канал публикуется объявление о продаже предмета «Медицинская сумка»?", a: "В категорию «Прочее»." },
          { q: "В какой канал публикуется объявление о поиске людей для помощи в выполнении квестов из БП?", a: "Такое сообщение допустимо в категории «Поиск»." },
          { q: "Разрешено ли написание транслитом в объявлениях?", a: "Нет, транслит запрещен." },
          { q: "В какой канал публикуется объявление о подселении? Разрешено ли арендовать дом с мастерской?", a: "Аренда дома публикуется в канал «Аренда». Арендовать с мастерской нельзя, так как для использования мастерской необходим доступ к кладовке, который получается через передачу ключей, а сделки с ключами запрещены." },
          { q: "Допускаются ли элементы разных категорий на одном изображении?", a: "Нет. Каждое изображение должно отображать свою категорию." },
          { q: "В каких случаях необходимо указывать стоимость товара?", a: "При продаже товара." },
          { q: "В каком канале публикуется объявление о поиске владельца бизнеса?", a: "В разделе «Бизнес»." },
          { q: "Могут ли два пользователя публиковать объявления о продаже одно и того же дома?", a: "Да, если нет нарушения КД в канале." },
          { q: "Для чего нужны тикеты на торговой площадке и можно ли через них получить роль Approved?", a: "Система тикетов позволяет решать спорные ситуации с модераторами. Получение роли Approved через тикеты невозможно." },
          { q: "Можно ли продать обвес на автомобиль? В каком канале?", a: "Да, продажа обвесов допустима в канале «Тюнинг»." },
          { q: "Можно ли в объявлении о наборе в семью добавлять ссылку на семейный Discord?", a: "Нет, так как канал семьи не является официальным ресурсом проекта." },
          { q: "Можно ли в канале «Реклама» опубликовать видео своей стрельбы?", a: "Нет, ссылки на видеоролики и прочий материал, не связанный с официальными ресурсами, запрещены." },
          { q: "Итоговый вердикт по кандидату:", a: "Подходит ли человек на пост?", isFinal: true }
        ];

        function App() {
          const [sessions, setSessions] = useState({});
          const [activeId, setActiveId] = useState('');
          const [loading, setLoading] = useState(true);

          const tableScrollRef = useRef(null);
          const topScrollRef = useRef(null);
          const tableRef = useRef(null);
          const topScrollInnerRef = useRef(null);

          useEffect(() => {
            const ref = db.ref('recruitment_sessions');
            ref.on('value', (snapshot) => {
              const data = snapshot.val() || {};
              setSessions(data);
              
              if (Object.keys(data).length === 0) {
                const firstId = 'session_' + Date.now();
                db.ref('recruitment_sessions/' + firstId).set({
                  id: firstId,
                  recruiter: "Recruiter 1",
                  candidates: [{ id: Date.now(), name: "Кандидат 1", info: "", answers: {} }]
                });
                setActiveId(firstId);
              } else if (!activeId) {
                setActiveId(Object.keys(data)[0]);
              }
              
              setLoading(false);
              setTimeout(() => { if(window.lucide) window.lucide.createIcons(); }, 100);
            });
            return () => ref.off();
          }, [activeId]);

          const handleTopScroll = () => {
            if (tableScrollRef.current && topScrollRef.current) {
              tableScrollRef.current.scrollLeft = topScrollRef.current.scrollLeft;
            }
          };

          const handleTableScroll = () => {
            if (tableScrollRef.current && topScrollRef.current) {
              topScrollRef.current.scrollLeft = tableScrollRef.current.scrollLeft;
            }
          };

          useEffect(() => {
            if (tableRef.current && topScrollInnerRef.current) {
              topScrollInnerRef.current.style.width = `${tableRef.current.offsetWidth}px`;
            }
          }, [sessions, activeId]);

          const addSession = () => {
            const name = prompt('Введите имя рекрутера:');
            if (!name) return;
            const id = 'session_' + Date.now();
            db.ref('recruitment_sessions/' + id).set({
              id, recruiter: name, candidates: [{ id: Date.now(), name: "Кандидат 1", info: "", answers: {} }]
            });
            setActiveId(id);
          };

          const renameSession = (id) => {
            const newName = prompt('Новое имя рекрутера:', sessions[id].recruiter);
            if (newName) db.ref(`recruitment_sessions/${id}/recruiter`).set(newName);
          };

          const deleteSession = (id) => {
            if (confirm('Удалить этого рекрутера и все его данные?')) {
              db.ref(`recruitment_sessions/${id}`).remove();
              setActiveId('');
            }
          };

          const addCandidate = () => {
            if (!activeId) return;
            const currentCandidates = sessions[activeId].candidates || [];
            const newC = { id: Date.now(), name: "Логин кандидата " + (currentCandidates.length + 1), info: "", answers: {} };
            db.ref(`recruitment_sessions/${activeId}/candidates`).set([...currentCandidates, newC]);
          };

          const removeCandidate = (cIdx) => {
            if (!confirm('Вы действительно хотите удалить этого кандидата?')) return;
            const currentCandidates = [...(sessions[activeId].candidates || [])];
            currentCandidates.splice(cIdx, 1);
            db.ref(`recruitment_sessions/${activeId}/candidates`).set(currentCandidates);
          };

          const updateCandidate = (cIdx, field, val) => {
            db.ref(`recruitment_sessions/${activeId}/candidates/${cIdx}/${field}`).set(val);
          };

          const updateAnswer = (cIdx, qIdx, val) => {
            db.ref(`recruitment_sessions/${activeId}/candidates/${cIdx}/answers/${qIdx}`).set(val);
          };

          const exportCSV = () => {
            const current = sessions[activeId];
            if (!current) return;
            
            let csv = "data:text/csv;charset=utf-8,\uFEFF";
            csv += `Рекрутер: ${current.recruiter}\n\n`;
            
            const headers = ["Вопрос", ...current.candidates.map(c => c.name)];
            csv += headers.join(";") + "\n";

            const infoRow = ["ИНФО КАНДИДАТА", ...current.candidates.map(c => `"${c.info.replace(/"/g, '""')}"`)];
            csv += infoRow.join(";") + "\n";

            QUESTIONS.forEach((q, idx) => {
              const row = [q.q, ...current.candidates.map(c => c.answers?.[idx] || "-")];
              csv += row.join(";") + "\n";
            });

            const link = document.createElement("a");
            link.setAttribute("href", encodeURI(csv));
            link.setAttribute("download", `Отчет_${current.recruiter}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
          };

          if (loading) return <div className="flex h-screen items-center justify-center font-bold text-2xl text-slate-600">Подключение к Cloud DB...</div>;

          const current = sessions[activeId];

          return (
            <div className="p-4 md:p-8 max-w-[1800px] mx-auto pb-20">
              
              {/* Header */}
              <div className="mb-6 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div className="p-8 bg-indigo-700 text-white">
                  <h1 className="text-3xl font-black mb-4 flex items-center gap-3">
                    <i data-lucide="shopping-cart"></i> Обзвон на Торговую Площадку
                  </h1>
                  <div className="bg-white/10 p-5 rounded-xl border border-white/20 text-indigo-50 italic text-xl font-medium">
                    "Приветствую. <br />
                      Вы попали на обзвон на пост модератора торговой площадки. <br /> 
                      Представьтесь пожалуйста, расскажите о себе, как вас зовут и сколько вам лет."
                  </div>
                  
                  <div className="mt-6 flex justify-between items-end">
                    
                    {/* КНОПКИ РЕКРУТЕРОВ (ИСПРАВЛЕНЫ) */}
                    <div className="flex gap-4 overflow-x-auto items-end">
                        {Object.values(sessions).map(s => (
                            <div key={s.id} className="flex flex-col items-center">
                                {/* Иконки управления НАД вкладкой активного рекрутера */}
                                {activeId === s.id && (
                                    <div className="flex gap-2 mb-1 bg-white/20 p-1.5 rounded-lg border border-white/10">
                                        <button onClick={() => renameSession(s.id)} className="p-1 bg-amber-500 text-white rounded-md hover:bg-amber-600 transition-colors" title="Переименовать"><i data-lucide="edit-3" className="w-4 h-4"></i></button>
                                        <button onClick={() => deleteSession(s.id)} className="p-1 bg-rose-500 text-white rounded-md hover:bg-rose-600 transition-colors" title="Удалить"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                    </div>
                                )}
                                {/* Заглушка высоты для неактивных вкладок, чтобы кнопки не прыгали */}
                                {activeId !== s.id && <div className="h-[38px]"></div>}
                                
                                <button 
                                    onClick={() => setActiveId(s.id)} 
                                    className={`px-6 py-3 rounded-t-lg font-bold text-lg transition-all flex items-center gap-2 ${activeId === s.id ? 'bg-white text-indigo-700' : 'bg-indigo-800 text-indigo-300 hover:bg-indigo-600'}`}
                                >
                                    {s.recruiter}
                                </button>
                            </div>
                        ))}
                        <div className="pb-2">
                            <button onClick={addSession} className="px-4 py-2 text-white hover:text-emerald-400 transition-colors" title="Добавить рекрутера"><i data-lucide="plus-circle" className="w-7 h-7"></i></button>
                        </div>
                    </div>
                    
                    {/* Кнопки управления */}
                    <div className="flex gap-3 pb-2">
                        <button onClick={addCandidate} className="bg-emerald-500 hover:bg-emerald-600 px-6 py-3.5 rounded-xl font-bold flex items-center gap-2 transition-all text-lg shadow-lg">
                            <i data-lucide="user-plus"></i> + Кандидат
                        </button>
                        <button onClick={exportCSV} className="bg-white text-slate-800 hover:bg-slate-100 px-6 py-3.5 rounded-xl font-bold flex items-center gap-2 transition-all shadow-lg text-lg border">
                            <i data-lucide="file-text"></i> Отчет
                        </button>
                    </div>
                  </div>
                </div>
              </div>

              {current ? (
                <div className="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden relative">
                  
                  {/* Верхний дополнительный скролл */}
                  <div ref={topScrollRef} onScroll={handleTopScroll} className="overflow-x-auto custom-scrollbar bg-slate-100 border-b">
                    <div ref={topScrollInnerRef} style={{ height: '10px' }}></div>
                  </div>

                  <div ref={tableScrollRef} onScroll={handleTableScroll} className="overflow-x-auto custom-scrollbar">
                    <table ref={tableRef} className="w-full border-collapse table-fixed">
                      <thead>
                        <tr className="bg-slate-50 border-b">
                          <th className="p-6 w-20 sticky-col text-slate-400 font-black text-center">#</th>
                          <th className="p-6 w-[500px] sticky-col-2 bg-slate-50 text-slate-500 text-left font-black">ВОПРОС / ОТВЕТ</th>
                          
                          {current.candidates?.map((c, idx) => (
                            <th key={c.id} className="p-6 w-[350px] border-l min-w-[320px] group relative bg-white">
                              <div className="flex items-center justify-between gap-2">
                                <input 
                                  className="font-black text-indigo-700 w-full outline-none bg-transparent text-xl border-b-2 border-transparent focus:border-indigo-300" 
                                  value={c.name} 
                                  onChange={(e) => updateCandidate(idx, 'name', e.target.value)} 
                                />
                                <button 
                                  onClick={() => removeCandidate(idx)}
                                  className="opacity-0 group-hover:opacity-100 p-1.5 bg-rose-100 text-rose-600 rounded-lg hover:bg-rose-200 transition-all"
                                  title="Удалить кандидата"
                                >
                                  <i data-lucide="trash-2" className="w-4 h-4"></i>
                                </button>
                              </div>
                              
                              <textarea 
                                className="w-full mt-3 p-3 text-base bg-slate-50 rounded-xl outline-none resize-none border border-slate-200 focus:bg-white transition-all focus:border-indigo-200" 
                                placeholder="Инфо о кандидате (опыт, фракция)..." 
                                rows="3"
                                value={c.info || ''} 
                                onChange={(e) => updateCandidate(idx, 'info', e.target.value)} 
                              />
                            </th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {QUESTIONS.map((q, qIdx) => (
                          <tr key={qIdx} className={`border-b hover:bg-slate-50/50 transition-colors ${q.isFinal ? 'bg-indigo-50/30' : ''}`}>
                            
                            <td className="p-6 text-center text-slate-300 font-black sticky-col text-2xl align-middle">
                              {q.isFinal ? <i data-lucide="award" className="w-7 h-7 text-indigo-500 mx-auto"></i> : qIdx + 1}
                            </td>
                            
                            <td className="p-6 sticky-col-2 bg-white">
                                <div className="font-bold text-slate-800 leading-snug mb-2 text-lg">{q.q}</div>
                                {q.a && (
                                  <div className="text-sm bg-emerald-50 text-emerald-700 p-2.5 rounded-lg border border-emerald-100 font-semibold">
                                    <span className="text-emerald-500 uppercase text-xs font-black block mb-0.5">Правильный ответ:</span>
                                    {q.a}
                                  </div>
                                )}
                            </td>
                            
                            {current.candidates?.map((c, cIdx) => (
                              <td key={c.id} className="p-6 border-l align-middle">
                                <select 
                                  className={`w-full p-4 border-2 rounded-2xl font-black outline-none cursor-pointer transition-all text-base ${
                                    c.answers?.[qIdx] === 'да' || c.answers?.[qIdx] === 'подходит' ? 'bg-emerald-50 border-emerald-200 text-emerald-700' : 
                                    c.answers?.[qIdx] === 'нет' || c.answers?.[qIdx] === 'не подходит' ? 'bg-rose-50 border-rose-200 text-rose-700' : 
                                    c.answers?.[qIdx] === '50/50' || c.answers?.[qIdx] === 'возможно подходит' ? 'bg-amber-50 border-amber-200 text-amber-700' :
                                    'bg-white border-slate-200 text-slate-400 focus:border-indigo-300'
                                  }`}
                                  value={c.answers?.[qIdx] || ''}
                                  onChange={(e) => updateAnswer(cIdx, qIdx, e.target.value)}
                                >
                                  {/* Прочерк заблокирован (disabled), его нельзя выбрать снова после изменения */}
                                  <option value="" disabled>-</option>
                                  {q.isFinal ? (
                                    <>
                                      <option value="подходит">ПОДХОДИТ</option>
                                      <option value="возможно подходит">ВОЗМОЖНО</option>
                                      <option value="не подходит">НЕ ПОДХОДИТ</option>
                                    </>
                                  ) : (
                                    <>
                                      <option value="да">ВЕРНО</option>
                                      <option value="нет">НЕВЕРНО</option>
                                      <option value="50/50">50 / 50</option>
                                    </>
                                  )}
                                </select>
                              </td>
                            ))}
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                  
                  {/* Footer Text */}
                  <div className="p-10 bg-slate-900 text-white border-t border-slate-800">
                    <div className="max-w-2xl mx-auto text-center">
                        <div className="text-emerald-400 font-bold mb-3 flex justify-center"><i data-lucide="check-circle" className="w-12 h-12"></i></div>
                        <p className="text-xl leading-relaxed italic opacity-90 font-medium">
                            "Вы успешно завершили обзвон. Результаты будут оглашены после обзвона других кандидатов в новостях торговой площадки. Желаем удачи!"
                        </p>
                    </div>
                  </div>
                </div>
              ) : (
                <div className="text-center p-20 bg-white rounded-2xl border-2 border-dashed border-slate-300 text-slate-400 font-bold text-xl">
                    Выберите рекрутера или создайте нового, чтобы начать работу
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
